spring:
  application:
    name: auth-service

  datasource:
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

server:
  port: 8086

# JWT Configuration
jwt:
  secret: ${JWT_SECRET:myVerySecureSecretKeyForJWT1234567890123456789012345678901234567890}
  expiration: 86400000  # 24 hours in milliseconds
  refresh-expiration: 604800000  # 7 days in milliseconds

logging:
  level:
    com.example.authservice: DEBUG
    org.springframework.security: DEBUG
